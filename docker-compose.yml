services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: i-dashboard-mongodb
    env_file:
      - /opt/i-dashboard/.env
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-i_dashboard}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - i-dashboard-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend Service
  backend:
    image: zaidrana/i-dashboard-backend:latest
    container_name: i-dashboard-backend
    env_file:
      - /opt/i-dashboard/.env
    ports:
      - "5000:5000"

    # Only keep variables that are NOT coming from env_file
    environment:
      PORT: 5000

    volumes:
      - ./Backend/uploads:/app/uploads

    depends_on:
      mongodb:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - i-dashboard-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend Service
  frontend:
    image: zaidrana/i-dashboard-frontend:latest
    container_name: i-dashboard-frontend
    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - i-dashboard-network

networks:
  i-dashboard-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local

  mongodb_config:
    driver: local

  backend-uploads:
    driver: local